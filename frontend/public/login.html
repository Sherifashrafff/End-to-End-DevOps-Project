<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Login</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <h1>TaskFlow</h1>
    <h2>Sign in</h2>
    <p id="error-msg" class="error"></p>
    <form id="login-form">
      <label>Email<input id="email" type="email" required autocomplete="email" /></label>
      <label>Password<input id="password" type="password" required autocomplete="current-password" /></label>
      <button type="submit">Sign in</button>
    </form>
    <p>No account? <a href="/register.html">Register</a></p>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
