<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Task</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <span class="logo">TaskFlow</span>
    <button id="back-btn">← Project</button>
    <button onclick="logout()">Logout</button>
  </header>

  <main>
    <p id="error-msg" class="error"></p>
    <section id="task-header">
      <h2 id="task-title"></h2>
      <p id="task-desc"></p>
      <div class="meta">
        <span>Status: <strong id="task-status"></strong></span>
        <span>Priority: <strong id="task-priority"></strong></span>
        <span>Assignee: <strong id="task-assignee"></strong></span>
        <span>Created by: <strong id="task-created"></strong></span>
      </div>
      <label>Update status:
        <select id="status-select">
          <option value="todo">To Do</option>
          <option value="in_progress">In Progress</option>
          <option value="done">Done</option>
        </select>
      </label>
    </section>

    <section>
      <h3>Comments</h3>
      <div id="comment-list"></div>
      <div id="comment-pagination" class="pagination"></div>

      <form id="comment-form" class="comment-form">
        <textarea id="comment-body" placeholder="Write a comment…" rows="3" required></textarea>
        <button type="submit">Post</button>
      </form>
    </section>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/task.js"></script>
</body>
</html>
